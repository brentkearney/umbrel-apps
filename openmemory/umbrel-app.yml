  - 2.jpg
  - 3.jpg
defaultUsername: ""
defaultPassword: ""
dependencies: []
releaseNotes: >-
  Initial release of OpenMemory for Umbrel.
path: ""
torOnly: false
# Must be true: Neo4j and other internal services use ${APP_PASSWORD} for authentication
deterministicPassword: true
